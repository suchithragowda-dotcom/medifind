<!DOCTYPE html>
<html>
<head>
    <title>Login - MediFind</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
        }

        .login-card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .login-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .google-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .divider {
            text-align: center;
            margin: 15px 0;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="login-title">Sign In</div>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" class="input-field" required>
            <input type="password" name="password" placeholder="Password" class="input-field" required>

            <button class="btn-primary" style="width:100%;">Login</button>
        </form>

        <div class="divider">OR</div>

        <!-- Google Sign In (Demo) -->
        <button class="google-btn" onclick="window.location.href='/google-login'">
            🔵 Sign in with Google
        </button>

    </div>

</div>

</body>
</html>
